name: Pinball CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint all packages
        run: bun run lint

      - name: Build all packages
        run: bun run build

      - name: Test all packages
        run: bun run test || echo "No tests yet"
