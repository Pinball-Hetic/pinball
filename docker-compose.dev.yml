services:
  db:
    image: postgres:15-alpine
    container_name: pinball-db-dev
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: pinball_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: pinball-server-dev
    environment:
      DATABASE_URL: "postgresql://dev_user:dev_password@db:5432/pinball_dev?schema=public"
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./packages/server/src:/app/packages/server/src
    depends_on:
      - db
    command: npm run dev -w @pinball/server

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    container_name: pinball-app-dev
    environment:
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./packages/app/src:/app/packages/app/src
      - ./packages/game-engine/src:/app/packages/game-engine/src
    depends_on:
      - server
    command: npm run dev -w @pinball/app

volumes:
  postgres_dev_data:
