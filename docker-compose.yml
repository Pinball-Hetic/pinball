services:
  db:
    image: postgres:15-alpine
    container_name: pinball-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pinball
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: pinball-server
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/pinball?schema=public"
    ports:
      - "3334:3334"
    depends_on:
      - db

  app:
    build:
      context: .
      dockerfile: packages/app/Dockerfile
    container_name: pinball-app
    ports:
      - "3333:3333"
    depends_on:
      - server

volumes:
  postgres_data:
